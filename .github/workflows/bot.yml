name: Daily Pairs Trading Bot

on:
  schedule:
    # Runs at 19:55 UTC (3:55 PM ET) Monday - Friday
    - cron: "55 19 * * 1-5"
  workflow_dispatch: # This adds a button to manually run it anytime!

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install statsmodels alpaca-trade-api pandas numpy python-dotenv yfinance

      - name: Execute Trading Script
        env:
          # This securely injects the secrets you saved in Step 1
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
          APCA_API_BASE_URL: ${{ secrets.APCA_API_BASE_URL }}
        run: |
          python live_pairs.py
